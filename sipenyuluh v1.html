<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI-PENYULUH | E-Report Professional</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .animate-fadeIn { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body class="bg-gray-50">

<div class="flex min-h-screen">
    <aside class="w-64 bg-green-900 text-white hidden md:flex flex-col shadow-2xl">
        <div class="p-6 text-2xl font-bold border-b border-green-800 flex items-center gap-3">
            <i class="fas fa-leaf text-green-400"></i> SI-PENYULUH
        </div>
        <nav class="p-4 space-y-2 flex-1">
            <p class="text-[10px] text-green-400 uppercase font-black tracking-widest mb-4">Input Laporan</p>
            <button onclick="showPage('Diseminasi Lapangan')" class="w-full text-left p-3 rounded-xl hover:bg-green-800 transition flex items-center gap-3">
                <i class="fas fa-map-marked-alt w-5"></i> Lapangan
            </button>
            <button onclick="showPage('Diseminasi Media Sosial')" class="w-full text-left p-3 rounded-xl hover:bg-green-800 transition flex items-center gap-3">
                <i class="fab fa-instagram w-5"></i> Media Sosial
            </button>
            <button onclick="showPage('Laporan LTT')" class="w-full text-left p-3 rounded-xl hover:bg-green-800 transition flex items-center gap-3">
                <i class="fas fa-seedling w-5"></i> Laporan LTT
            </button>
            <button onclick="showPage('Pengawalan dan Pendampingan')" class="w-full text-left p-3 rounded-xl hover:bg-green-800 transition flex items-center gap-3">
                <i class="fas fa-user-shield w-5"></i> Pengawalan
            </button>
            <div class="my-6 border-t border-green-800"></div>
            <button onclick="showDashboard()" class="w-full text-left p-3 rounded-xl bg-green-700 hover:bg-green-600 transition flex items-center gap-3 shadow-lg">
                <i class="fas fa-th-large w-5"></i> Dashboard
            </button>
        </nav>
        <div class="p-4 text-[10px] text-center text-green-500 border-t border-green-800">
            &copy; 2026 E-Report Penyuluh
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-10">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-black text-gray-800" id="title">Dashboard Utama</h1>
                <p class="text-gray-500" id="header-subtitle">Rekapitulasi aktivitas penyuluhan</p>
            </div>
            <div id="current-date" class="bg-white px-4 py-2 rounded-lg shadow-sm text-sm font-bold text-green-700 border border-green-100"></div>
        </header>

        <div id="dashboard" class="animate-fadeIn">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-500">
                    <p class="text-xs font-bold text-gray-400 uppercase">Total</p>
                    <h2 id="totalData" class="text-3xl font-black text-gray-800">0</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
                    <p class="text-xs font-bold text-gray-400 uppercase">Lapangan</p>
                    <h2 id="statLapangan" class="text-3xl font-black text-gray-800">0</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-purple-500">
                    <p class="text-xs font-bold text-gray-400 uppercase">Medsos</p>
                    <h2 id="statMedsos" class="text-3xl font-black text-gray-800">0</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-orange-500">
                    <p class="text-xs font-bold text-gray-400 uppercase">LTT</p>
                    <h2 id="statLTT" class="text-3xl font-black text-gray-800">0</h2>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 flex flex-wrap gap-4 items-end border border-gray-100">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2">Cari Kategori</label>
                    <select id="filterKategori" class="w-full bg-gray-50 border-none p-3 rounded-xl focus:ring-2 focus:ring-green-500 outline-none text-sm">
                        <option value="">Semua Kategori</option>
                        <option>Diseminasi Lapangan</option>
                        <option>Diseminasi Media Sosial</option>
                        <option>Laporan LTT</option>
                        <option>Pengawalan dan Pendampingan</option>
                    </select>
                </div>
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2">Bulan</label>
                    <input type="month" id="filterBulan" class="w-full bg-gray-50 border-none p-3 rounded-xl outline-none text-sm">
                </div>
                <div class="flex gap-2">
                    <button onclick="renderTable()" class="bg-gray-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-black transition text-sm">Filter</button>
                    <button onclick="exportPDF()" class="bg-red-600 text-white px-4 py-3 rounded-xl font-bold hover:bg-red-700 transition"><i class="fas fa-file-pdf"></i></button>
                    <button onclick="exportExcel()" class="bg-green-700 text-white px-4 py-3 rounded-xl font-bold hover:bg-green-800 transition"><i class="fas fa-file-excel"></i></button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-400 text-[10px] font-black uppercase">
                        <tr>
                            <th class="p-5">Waktu</th>
                            <th class="p-5">Kategori & Lokasi</th>
                            <th class="p-5">Keterangan</th>
                            <th class="p-5">Dokumentasi</th>
                            <th class="p-5 text-center">Opsi</th>
                        </tr>
                    </thead>
                    <tbody id="tableData" class="text-sm divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </div>

        <div id="formInput" class="hidden animate-fadeIn">
            <div class="max-w-3xl mx-auto bg-white p-10 rounded-3xl shadow-xl border border-gray-100">
                <form id="form" class="space-y-6">
                    <input type="hidden" id="kategori">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700">Tanggal</label>
                            <input type="date" id="tgl" required class="w-full bg-gray-50 border-none p-4 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700">Lokasi / Wilayah</label>
                            <input type="text" id="lokasi" required placeholder="Nama Desa/Kelompok" class="w-full bg-gray-50 border-none p-4 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700">Isi Laporan / Keterangan</label>
                        <textarea id="ket" rows="4" placeholder="Tuliskan detail kegiatan di sini..." class="w-full bg-gray-50 border-none p-4 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none"></textarea>
                    </div>

                    <div id="fotoBiasa" class="p-8 border-2 border-dashed border-gray-200 rounded-2xl text-center bg-gray-50">
                        <i class="fas fa-cloud-upload-alt text-3xl text-gray-300 mb-3 block"></i>
                        <input type="file" id="foto" accept="image/*" class="text-xs">
                    </div>

                    <div id="fotoMedsos" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4 p-6 bg-blue-50 rounded-2xl border border-blue-100">
                        <div><label class="text-[10px] font-bold block mb-2 text-blue-600 uppercase">Like</label><input type="file" id="fotoLike" accept="image/*" class="text-[10px]"></div>
                        <div><label class="text-[10px] font-bold block mb-2 text-blue-600 uppercase">Komen</label><input type="file" id="fotoKomentar" accept="image/*" class="text-[10px]"></div>
                        <div><label class="text-[10px] font-bold block mb-2 text-blue-600 uppercase">Share</label><input type="file" id="fotoShare" accept="image/*" class="text-[10px]"></div>
                    </div>

                    <div class="flex gap-4 pt-4">
                        <button type="button" onclick="showDashboard()" class="flex-1 bg-gray-100 text-gray-600 font-bold py-4 rounded-2xl hover:bg-gray-200 transition">Batal</button>
                        <button type="submit" class="flex-[2] bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-green-200 hover:bg-green-700 transition">Kirim Laporan</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>

<script>
    const dbKey = "db_penyuluh_v3_final";
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    const getData = () => JSON.parse(localStorage.getItem(dbKey)) || [];
    const saveData = (data) => localStorage.setItem(dbKey, JSON.stringify(data));

    function showPage(kat) {
        document.getElementById("dashboard").style.display = "none";
        document.getElementById("formInput").style.display = "block";
        document.getElementById("kategori").value = kat;
        document.getElementById("title").innerText = "Input Laporan";
        document.getElementById("header-subtitle").innerText = kat;
        document.getElementById("fotoMedsos").classList.toggle("hidden", kat !== "Diseminasi Media Sosial");
        document.getElementById("fotoBiasa").classList.toggle("hidden", kat === "Diseminasi Media Sosial");
    }

    function showDashboard() {
        document.getElementById("dashboard").style.display = "block";
        document.getElementById("formInput").style.display = "none";
        document.getElementById("title").innerText = "Dashboard Utama";
        document.getElementById("header-subtitle").innerText = "Rekapitulasi aktivitas penyuluhan";
        updateStats();
        renderTable();
    }

    document.getElementById("form").addEventListener("submit", async function(e) {
        e.preventDefault();
        const kat = document.getElementById("kategori").value;
        const data = getData();
        const toBase64 = f => f ? new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); }) : null;

        const entry = {
            id: Date.now(),
            tanggal: document.getElementById("tgl").value,
            kategori: kat,
            lokasi: document.getElementById("lokasi").value,
            ket: document.getElementById("ket").value,
            foto: await toBase64(document.getElementById("foto").files[0]),
            fotoLike: await toBase64(document.getElementById("fotoLike").files[0]),
            fotoKomentar: await toBase64(document.getElementById("fotoKomentar").files[0]),
            fotoShare: await toBase64(document.getElementById("fotoShare").files[0])
        };

        data.push(entry);
        saveData(data);
        alert("✅ Laporan Berhasil Terkirim!");
        this.reset();
        showDashboard();
    });

    function deleteData(id) { if(confirm("Hapus laporan ini secara permanen?")) { saveData(getData().filter(d => d.id !== id)); updateStats(); renderTable(); } }

    function updateStats() {
        const d = getData();
        document.getElementById("totalData").innerText = d.length;
        document.getElementById("statLapangan").innerText = d.filter(x => x.kategori === "Diseminasi Lapangan").length;
        document.getElementById("statMedsos").innerText = d.filter(x => x.kategori === "Diseminasi Media Sosial").length;
        document.getElementById("statLTT").innerText = d.filter(x => x.kategori === "Laporan LTT").length;
    }

    function renderTable() {
        let data = getData().sort((a,b) => b.id - a.id);
        const fk = document.getElementById("filterKategori").value;
        const fb = document.getElementById("filterBulan").value;
        if(fk) data = data.filter(x => x.kategori === fk);
        if(fb) data = data.filter(x => x.tanggal.startsWith(fb));

        const tbody = document.getElementById("tableData");
        tbody.innerHTML = data.map(d => `
            <tr>
                <td class="p-5 font-bold text-gray-400">${d.tanggal}</td>
                <td class="p-5"><p class="font-black text-green-800">${d.kategori}</p><p class="text-xs text-gray-400">${d.lokasi}</p></td>
                <td class="p-5 text-gray-500 max-w-xs truncate">${d.ket}</td>
                <td class="p-5 text-center">
                    <div class="flex gap-1 justify-center">
                        ${(d.foto || d.fotoLike) ? `<img src="${d.foto || d.fotoLike}" class="w-10 h-10 object-cover rounded-lg ring-2 ring-white">` : '<span class="text-gray-300">-</span>'}
                    </div>
                </td>
                <td class="p-5 text-center"><button onclick="deleteData(${d.id})" class="text-red-300 hover:text-red-600 transition"><i class="fas fa-trash-alt"></i></button></td>
            </tr>`).join('');
    }

    // --- EKSPOR PDF DENGAN GAMBAR DALAM TABEL ---
    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        let data = getData();
        const fk = document.getElementById("filterKategori").value;
        const fb = document.getElementById("filterBulan").value;
        if(fk) data = data.filter(x => x.kategori === fk);
        if(fb) data = data.filter(x => x.tanggal.startsWith(fb));

        doc.setFontSize(20);
        doc.setTextColor(20, 80, 40);
        doc.text("LAPORAN KERJA PENYULUH PERTANIAN", 14, 20);
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Dicetak: ${new Date().toLocaleString()} | Filter: ${fk || 'Semua'} | Bulan: ${fb || 'Semua'}`, 14, 28);

        doc.autoTable({
            startY: 35,
            head: [['No', 'Tanggal', 'Kategori', 'Lokasi', 'Keterangan', 'Dokumentasi']],
            body: data.map((d, i) => [i + 1, d.tanggal, d.kategori, d.lokasi, d.ket, '']),
            theme: 'grid',
            headStyles: { fillColor: [20, 80, 40], fontSize: 10, halign: 'center' },
            styles: { minCellHeight: 25, verticalAlign: 'middle', fontSize: 9 },
            columnStyles: { 5: { cellWidth: 35 } },
            didDrawCell: function(dataCell) {
                if (dataCell.section === 'body' && dataCell.column.index === 5) {
                    const item = data[dataCell.row.index];
                    const img = item.foto || item.fotoLike;
                    if (img) {
                        try {
                            doc.addImage(img, 'JPEG', dataCell.cell.x + 2, dataCell.cell.y + 2, 31, 21);
                        } catch (e) {}
                    }
                }
            }
        });
        doc.save(`SI-PENYULUH-${fb || 'ALL'}.pdf`);
    }

    function exportExcel() {
        let data = getData();
        const clean = data.map((d, i) => ({ "No": i+1, "Tgl": d.tanggal, "Kategori": d.kategori, "Lokasi": d.lokasi, "Ket": d.ket, "Dokumentasi": (d.foto||d.fotoLike)?"Ada":"Tidak" }));
        const ws = XLSX.utils.json_to_sheet(clean);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Laporan");
        XLSX.writeFile(wb, `E-Report_Penyuluh_${Date.now()}.xlsx`);
    }

    showDashboard();
</script>
</body>
</html>
